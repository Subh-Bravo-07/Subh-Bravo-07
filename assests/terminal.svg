<svg viewBox="0 0 700 420" xmlns="http://www.w3.org/2000/svg" font-family="'Courier New', Courier, monospace">
  <defs>
    <style>
      .bg { fill: #0d1117; }
      .titlebar { fill: #161b22; }
      .dot-r { fill: #ff5f57; }
      .dot-y { fill: #febc2e; }
      .dot-g { fill: #28c840; }
      .prompt { fill: #00ff41; font-size: 13px; }
      .cmd { fill: #c9d1d9; font-size: 13px; }
      .out { fill: #8b949e; font-size: 13px; }
      .hi { fill: #00ff41; font-size: 13px; }
      .cursor { fill: #00ff41; }
      .title-text { fill: #8b949e; font-size: 12px; }

      /* Line-by-line fade-in */
      .l1  { opacity: 0; animation: fade 0.1s 0.3s forwards; }
      .l2  { opacity: 0; animation: fade 0.1s 0.9s forwards; }
      .l3  { opacity: 0; animation: fade 0.1s 1.5s forwards; }
      .l4  { opacity: 0; animation: fade 0.1s 2.1s forwards; }
      .l5  { opacity: 0; animation: fade 0.1s 2.7s forwards; }
      .l6  { opacity: 0; animation: fade 0.1s 3.3s forwards; }
      .l7  { opacity: 0; animation: fade 0.1s 3.9s forwards; }
      .l8  { opacity: 0; animation: fade 0.1s 4.5s forwards; }
      .l9  { opacity: 0; animation: fade 0.1s 5.1s forwards; }
      .l10 { opacity: 0; animation: fade 0.1s 5.7s forwards; }
      .l11 { opacity: 0; animation: fade 0.1s 6.3s forwards; }
      .l12 { opacity: 0; animation: fade 0.1s 6.9s forwards; }
      .l13 { opacity: 0; animation: fade 0.1s 7.5s forwards; }
      .l14 { opacity: 0; animation: fade 0.1s 8.1s forwards; }
      .l15 { opacity: 0; animation: fade 0.1s 8.7s forwards; }
      .l16 { opacity: 0; animation: fade 0.1s 9.3s forwards; }

      /* Cursor blink */
      .blink { animation: blink 1s step-end infinite; }

      @keyframes fade {
        to { opacity: 1; }
      }
      @keyframes blink {
        0%, 100% { opacity: 1; }
        50%       { opacity: 0; }
      }
    </style>
  </defs>

  <!-- Terminal window -->
  <rect width="700" height="420" rx="10" class="bg"/>

  <!-- Title bar -->
  <rect width="700" height="36" rx="10" class="titlebar"/>
  <rect y="18" width="700" height="18" class="titlebar"/>

  <!-- Traffic lights -->
  <circle cx="20" cy="18" r="6" class="dot-r"/>
  <circle cx="40" cy="18" r="6" class="dot-y"/>
  <circle cx="60" cy="18" r="6" class="dot-g"/>

  <!-- Title -->
  <text x="350" y="23" text-anchor="middle" class="title-text">H.I.V.E.MIND@kali — bash</text>

  <!-- === LINES === -->

  <!-- whoami -->
  <text x="20" y="65" class="l1">
    <tspan class="prompt">┌──(</tspan><tspan class="hi">H.I.V.E.MIND</tspan><tspan class="prompt">㉿kali)-[</tspan><tspan class="cmd">~</tspan><tspan class="prompt">]</tspan>
  </text>
  <text x="20" y="83" class="l2">
    <tspan class="prompt">└─$ </tspan><tspan class="cmd">whoami</tspan>
  </text>
  <text x="20" y="101" class="out l3">H.I.V.E.MIND — Cybersecurity Enthusiast | CTF Player | Builder</text>

  <!-- nmap scan joke -->
  <text x="20" y="127" class="l4">
    <tspan class="prompt">┌──(</tspan><tspan class="hi">H.I.V.E.MIND</tspan><tspan class="prompt">㉿kali)-[</tspan><tspan class="cmd">~</tspan><tspan class="prompt">]</tspan>
  </text>
  <text x="20" y="145" class="l5">
    <tspan class="prompt">└─$ </tspan><tspan class="cmd">nmap -sV --script=fun localhost</tspan>
  </text>
  <text x="20" y="163" class="out l6">Starting Nmap scan... (because I scan everything I own)</text>
  <text x="20" y="181" class="out l7">PORT     STATE  SERVICE    VERSION</text>
  <text x="20" y="199" class="l8">
    <tspan class="out">1337/tcp </tspan><tspan class="hi">open</tspan><tspan class="out">   hacker     elite</tspan>
  </text>
  <text x="20" y="217" class="l9">
    <tspan class="out">9000/tcp </tspan><tspan class="hi">open</tspan><tspan class="out">   coffee      always_on</tspan>
  </text>
  <text x="20" y="235" class="l10">
    <tspan class="out">4444/tcp </tspan><tspan class="hi">open</tspan><tspan class="out">   curiosity   v∞ (no patch available)</tspan>
  </text>

  <!-- fortune -->
  <text x="20" y="261" class="l11">
    <tspan class="prompt">┌──(</tspan><tspan class="hi">H.I.V.E.MIND</tspan><tspan class="prompt">㉿kali)-[</tspan><tspan class="cmd">~</tspan><tspan class="prompt">]</tspan>
  </text>
  <text x="20" y="279" class="l12">
    <tspan class="prompt">└─$ </tspan><tspan class="cmd">cat /etc/motd</tspan>
  </text>
  <text x="20" y="297" class="hi l13">"The quieter you become, the more you can hear."</text>
  <text x="20" y="315" class="out l14">                              — Kali Linux MOTD</text>

  <!-- alias -->
  <text x="20" y="341" class="l15">
    <tspan class="prompt">┌──(</tspan><tspan class="hi">H.I.V.E.MIND</tspan><tspan class="prompt">㉿kali)-[</tspan><tspan class="cmd">~</tspan><tspan class="prompt">]</tspan>
  </text>
  <text x="20" y="359" class="l16">
    <tspan class="prompt">└─$ </tspan><tspan class="cmd">alias hack=</tspan><tspan class="hi">"learn &amp;&amp; practice &amp;&amp; repeat"</tspan>
  </text>

  <!-- blinking cursor -->
  <rect x="20" y="376" width="8" height="15" class="cursor blink"/>
</svg>
